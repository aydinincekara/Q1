<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Elif Ba Ta — Kuran Harfleri</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF9F2;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar {
      width: 100%;
      max-width: 520px;
      padding: 18px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stars-box {
      background: #FEF3C7;
      border-radius: 24px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 18px;
      font-weight: 900;
      color: #D97706;
    }

    .counter-box {
      background: white;
      border-radius: 24px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 800;
      color: #9CA3AF;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .main {
      flex: 1;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 28px 12px;
    }

    .card-wrap {
      width: 100%;
      position: relative;
    }

    .card {
      width: 100%;
      border-radius: 36px;
      padding: 32px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      min-height: 320px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      transition: transform 0.12s ease;
    }

    .card:active { transform: scale(0.97); }

    .card.bounce {
      animation: bounce 0.38s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes bounce {
      0%,100% { transform: scale(1) rotate(0deg); }
      25%      { transform: scale(1.07) rotate(-1deg); }
      60%      { transform: scale(0.95) rotate(1deg); }
    }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      pointer-events: none;
    }

    .letter-ar {
      font-family: 'Amiri', serif;
      font-size: clamp(120px, 30vw, 180px);
      line-height: 1.1;
      color: rgba(255,255,255,0.96);
      text-shadow: 0 6px 24px rgba(0,0,0,0.22);
      position: relative;
      z-index: 1;
    }

    .letter-tr {
      font-size: clamp(28px, 7vw, 40px);
      font-weight: 900;
      color: rgba(255,255,255,0.92);
      letter-spacing: 3px;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    .tap-hint {
      position: absolute;
      bottom: 16px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 1;
    }

    .nav {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .nav-btn {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: 0 4px 18px rgba(0,0,0,0.1);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
      color: #374151;
    }
    .nav-btn:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .nav-btn:disabled { opacity: 0.25; pointer-events: none; }

    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      height: 9px;
      border-radius: 5px;
      background: #DDD6CB;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    .dot-active { width: 28px; }
    .dot-done   { width: 9px; background: #10B981; }
    .dot-idle   { width: 9px; }

    .hint-bar {
      padding: 4px 0 18px;
      font-size: 13px;
      font-weight: 800;
      color: #C4B5A0;
      text-align: center;
      min-height: 36px;
      transition: all 0.3s;
    }

    /* Particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 300;
      animation: pfly 0.7s ease-out forwards;
    }
    @keyframes pfly {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to   { transform: translate(var(--tx),var(--ty)) scale(0.1); opacity: 0; }
    }

    /* Stars fly */
    .flystar {
      position: fixed;
      pointer-events: none;
      z-index: 300;
      font-size: 30px;
      animation: flystar 1.1s ease-out forwards;
    }
    @keyframes flystar {
      from { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 1; }
      to   { transform: translateY(-220px) scale(1.1) rotate(400deg); opacity: 0; }
    }

    /* Card slide transitions */
    .slide-right { animation: slideR 0.3s cubic-bezier(.22,.61,.36,1); }
    .slide-left  { animation: slideL 0.3s cubic-bezier(.22,.61,.36,1); }
    @keyframes slideR { from { transform: translateX(70px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes slideL { from { transform: translateX(-70px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* Pulse on new star */
    @keyframes pulseStar {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.35); }
    }
    .star-pulse { animation: pulseStar 0.4s ease; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="stars-box">⭐ <span id="starCount">0</span></div>
  <div class="counter-box" id="counterText">1 / 28</div>
</div>

<div class="main">
  <div class="card-wrap">
    <div class="card" id="card" onclick="playLetter()">
      <div class="deco-circle" style="width:200px;height:200px;top:-60px;right:-40px"></div>
      <div class="deco-circle" style="width:120px;height:120px;bottom:-30px;left:-20px"></div>
      <div class="letter-ar" id="letterAr">ا</div>
      <div class="letter-tr" id="letterTr">ELİF</div>
      <div class="tap-hint">👆 dokunun</div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>◀</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">▶</button>
</div>

<div class="hint-bar" id="hintBar">Harfe dokunarak sesini duyabilirsin 🔊</div>

<script>
const LETTERS = [
  { ar:'ا', tr:'ELİF',  c:'#E17055', h:'#D63031' },
  { ar:'ب', tr:'BE',    c:'#FDCB6E', h:'#E17055' },
  { ar:'ت', tr:'TE',    c:'#00B894', h:'#00CEC9' },
  { ar:'ث', tr:'SE',    c:'#0984E3', h:'#74B9FF' },
  { ar:'ج', tr:'CİM',   c:'#6C5CE7', h:'#A29BFE' },
  { ar:'ح', tr:'HA',    c:'#E84393', h:'#FD79A8' },
  { ar:'خ', tr:'HI',    c:'#00CEC9', h:'#81ECEC' },
  { ar:'د', tr:'DAL',   c:'#D63031', h:'#FF7675' },
  { ar:'ذ', tr:'ZEL',   c:'#E17055', h:'#FAB1A0' },
  { ar:'ر', tr:'RE',    c:'#2D3436', h:'#636E72' },
  { ar:'ز', tr:'ZE',    c:'#00B894', h:'#55EFC4' },
  { ar:'س', tr:'SİN',   c:'#0984E3', h:'#74B9FF' },
  { ar:'ش', tr:'ŞIN',   c:'#E84393', h:'#FD79A8' },
  { ar:'ص', tr:'SAD',   c:'#FDCB6E', h:'#FFEAA7' },
  { ar:'ض', tr:'DAD',   c:'#6C5CE7', h:'#A29BFE' },
  { ar:'ط', tr:'TI',    c:'#00CEC9', h:'#81ECEC' },
  { ar:'ظ', tr:'ZI',    c:'#D63031', h:'#FF7675' },
  { ar:'ع', tr:'AYN',   c:'#2D3436', h:'#636E72' },
  { ar:'غ', tr:'ĞAYN',  c:'#E17055', h:'#FAB1A0' },
  { ar:'ف', tr:'FE',    c:'#0984E3', h:'#74B9FF' },
  { ar:'ق', tr:'KAF',   c:'#6C5CE7', h:'#A29BFE' },
  { ar:'ك', tr:'KEF',   c:'#E84393', h:'#FD79A8' },
  { ar:'ل', tr:'LAM',   c:'#00B894', h:'#55EFC4' },
  { ar:'م', tr:'MİM',   c:'#FDCB6E', h:'#E17055' },
  { ar:'ن', tr:'NUN',   c:'#D63031', h:'#FF7675' },
  { ar:'ه', tr:'HE',    c:'#00CEC9', h:'#81ECEC' },
  { ar:'و', tr:'VAV',   c:'#2D3436', h:'#636E72' },
  { ar:'ي', tr:'YE',    c:'#6C5CE7', h:'#A29BFE' },
];

const DOT_N = 7;
let cur = 0, stars = 0;
const heard = new Set();

function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  const start = Math.floor(cur / DOT_N) * DOT_N;
  const end = Math.min(start + DOT_N, LETTERS.length);
  for (let i = start; i < end; i++) {
    const d = document.createElement('div');
    const isActive = i === cur;
    const isDone  = heard.has(i) && !isActive;
    d.className = 'dot ' + (isActive ? 'dot-active' : isDone ? 'dot-done' : 'dot-idle');
    if (isActive) d.style.background = LETTERS[i].c;
    el.appendChild(d);
  }
}

function updateCard(dir) {
  const L = LETTERS[cur];
  const card = document.getElementById('card');
  card.style.background = `linear-gradient(145deg, ${L.c}, ${L.h})`;
  document.getElementById('letterAr').textContent = L.ar;
  document.getElementById('letterTr').textContent = L.tr;
  document.getElementById('counterText').textContent = `${cur+1} / ${LETTERS.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === LETTERS.length - 1;
  if (dir) {
    card.classList.remove('slide-right','slide-left','bounce');
    void card.offsetWidth;
    card.classList.add(dir === 1 ? 'slide-right' : 'slide-left');
  }
  buildDots();
}

function navigate(dir) {
  const n = cur + dir;
  if (n < 0 || n >= LETTERS.length) return;
  cur = n;
  updateCard(dir);
}

function playLetter() {
  const L = LETTERS[cur];
  const card = document.getElementById('card');

  card.classList.remove('bounce');
  void card.offsetWidth;
  card.classList.add('bounce');

  spawnParticles();

  if (!heard.has(cur)) {
    heard.add(cur);
    stars++;
    const sc = document.getElementById('starCount');
    sc.textContent = stars;
    sc.parentElement.classList.add('star-pulse');
    setTimeout(() => sc.parentElement.classList.remove('star-pulse'), 420);
    spawnStars();
    buildDots();

    const msgs = [
      'Harika! 🎉', 'Süper! ⭐', 'Aferin! 🌟', 'Mükemmel! 💫', 'Bravo! 🎊'
    ];
    const hint = document.getElementById('hintBar');
    hint.textContent = msgs[Math.floor(Math.random()*msgs.length)] + ' ' + L.tr + ' harfini öğrendin!';
    setTimeout(() => {
      hint.textContent = 'Harfe dokunarak sesini duyabilirsin 🔊';
    }, 2200);
  }

  speakLetter(L.ar, L.tr);
}

function speakLetter(ar, tr) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const voices = window.speechSynthesis.getVoices();
  const arVoice = voices.find(v => v.lang.startsWith('ar'));
  const trVoice = voices.find(v => v.lang.startsWith('tr'));

  const speak = (text, lang, voice, rate, pitch) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = pitch;
    if (voice) u.voice = voice;
    return u;
  };

  if (arVoice) {
    window.speechSynthesis.speak(speak(ar, 'ar-SA', arVoice, 0.7, 1.1));
  }
  window.speechSynthesis.speak(speak(tr.toLowerCase(), 'tr-TR', trVoice || null, 0.75, 1.2));
}

function spawnParticles() {
  const card = document.getElementById('card');
  const r = card.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  const L = LETTERS[cur];
  const colors = [L.c, L.h, '#FFFFFF', '#FFD700', '#FFF'];

  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 7 + Math.random() * 11;
    const angle = (i / 14) * Math.PI * 2 + Math.random() * 0.3;
    const dist = 55 + Math.random() * 90;
    p.style.cssText = `width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};
      left:${cx-sz/2}px;top:${cy-sz/2}px;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 750);
  }
}

function spawnStars() {
  const emojis = ['⭐','✨','🌟','💫','🎉'];
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'flystar';
      s.textContent = emojis[i % emojis.length];
      s.style.left  = (15 + Math.random() * 70) + '%';
      s.style.bottom = '25%';
      s.style.animationDelay = (i * 0.07) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1300);
    }, i * 55);
  }
}

// Init voices early
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

updateCard(null);
</script>
</body>
</html>
