<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Harf Yarışı</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
html,body{height:100%;overflow:hidden;background:#111;font-family:sans-serif}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  background:#111;position:relative;max-width:430px;margin:0 auto}

/* ══ MENÜ ══ */
#menuScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(180deg,#0f0c29 0%,#302b63 60%,#1a1060 100%);z-index:50}
.stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star-dot{position:absolute;border-radius:50%;background:white;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
.menu-content{position:relative;z-index:1;text-align:center;padding:24px;width:100%}
.m-cars{font-size:56px;margin-bottom:12px;animation:carFloat 1.2s ease-in-out infinite}
@keyframes carFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.m-title{font-size:30px;font-weight:900;color:white;letter-spacing:2px;
  text-shadow:0 0 30px rgba(162,155,254,.9)}
.m-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:4px;margin-bottom:28px}
.m-modes{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;width:100%;max-width:320px}
.mode-btn{width:100%;padding:16px 20px;border:none;border-radius:20px;
  font-family:sans-serif;font-size:17px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;gap:14px;text-align:left;
  transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
.mode-btn:active{transform:scale(.96)}
.mode-icon{font-size:28px;flex-shrink:0}
.mode-info h3{font-size:15px;font-weight:900;margin-bottom:2px}
.mode-info p{font-size:11px;opacity:.75;line-height:1.3}
.mode-road{background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:white;
  box-shadow:0 8px 24px rgba(108,92,231,.5)}
.mode-time{background:linear-gradient(135deg,#E17055,#FF7675);color:white;
  box-shadow:0 8px 24px rgba(225,112,85,.5)}
.mode-hill{background:linear-gradient(135deg,#00B894,#00CEC9);color:white;
  box-shadow:0 8px 24px rgba(0,184,148,.5)}
.m-new{position:absolute;top:8px;right:12px;font-size:9px;font-weight:900;
  background:rgba(255,255,255,.25);padding:2px 6px;border-radius:10px;letter-spacing:1px}

/* ══ OYUN ══ */
#gameScreen{position:absolute;inset:0;display:none;flex-direction:column}

/* HUD */
.hud{height:52px;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
  background:rgba(0,0,0,.4)}
.hud-lives{font-size:18px;letter-spacing:1px}
.hud-target{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.hud-target-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px}
.hud-target-letter{font-family:'Amiri',serif;font-size:38px;line-height:1;
  text-shadow:0 0 20px currentColor;transition:all .3s}
.hud-target-pic{font-size:20px}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hud-score{font-size:16px;font-weight:900;color:#FFD700}
.hud-streak{font-size:10px;color:#FF7675;font-weight:700;min-height:14px}

/* Yakıt barı */
.fuel-bar-wrap{height:10px;background:rgba(255,255,255,.1);flex-shrink:0;position:relative}
.fuel-bar-fill{height:100%;background:linear-gradient(90deg,#E17055,#FDCB6E);
  transition:width .1s linear;border-radius:0 4px 4px 0}
.fuel-bar-icon{position:absolute;right:6px;top:-4px;font-size:18px}

/* CANVAS */
#gameCanvas{flex:1;width:100%;display:block;cursor:none}

/* Dokunma alanları */
.touch-zones{position:absolute;bottom:0;left:0;right:0;height:35%;display:flex;pointer-events:none}
.touch-l,.touch-r{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:32px;opacity:0;transition:opacity .15s}
.touch-l.active,.touch-r.active{opacity:.4}

/* Geri sayım overlay */
#cdOverlay{position:absolute;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:30;display:none}
.cd-num{font-size:110px;font-weight:900;color:white;
  text-shadow:0 0 60px rgba(162,155,254,1);animation:cdAnim .42s ease-out forwards}
@keyframes cdAnim{0%{transform:scale(1.8);opacity:0}40%{opacity:1}100%{transform:scale(.7);opacity:0}}

/* ══ BİTİŞ ══ */
#endScreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(180deg,#0f0c29,#302b63);z-index:50}
.end-content{text-align:center;padding:28px;width:100%;max-width:340px}
.end-emoji{font-size:80px;animation:bigpop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes bigpop{from{transform:scale(0)}to{transform:scale(1)}}
.end-title{font-size:26px;font-weight:900;color:white;margin:12px 0 20px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.stat-card{background:rgba(255,255,255,.08);border-radius:14px;padding:12px 8px}
.stat-n{font-size:24px;font-weight:900;color:#FFD700}
.stat-l{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.e-btns{display:flex;gap:10px}
.e-btn{flex:1;padding:16px;border:none;border-radius:16px;font-family:sans-serif;
  font-size:15px;font-weight:900;cursor:pointer;transition:transform .1s}
.e-btn:active{transform:scale(.95)}
.e-replay{background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:white}
.e-menu{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}

/* Particle */
.fp{position:fixed;border-radius:50%;pointer-events:none;z-index:999;
  animation:fp .7s ease-out forwards}
@keyframes fp{from{transform:translate(0,0) scale(1);opacity:1}
  to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
</style>
</head>
<body>
<div id="app">

<!-- MENÜ -->
<div id="menuScreen">
  <div class="stars-bg" id="starsBg"></div>
  <div class="menu-content">
    <div class="m-cars" id="mCars">🚗💨</div>
    <div class="m-title">HARF YARIŞI</div>
    <div class="m-sub">KUR'AN HARFLERİ</div>
    <div class="m-modes">
      <button class="mode-btn mode-road" onclick="startGame('road')">
        <div class="mode-icon">🛣️</div>
        <div class="mode-info"><h3>Road Fighter</h3><p>Doğru harfi yakala, yanlıştan kaç — şerit değiştir</p></div>
      </button>
      <button class="mode-btn mode-time" onclick="startGame('time')">
        <div class="mode-icon">⏱️</div>
        <div class="mode-info"><h3>Zamana Karşı</h3><p>Süre bitmeden harfleri topla, hareke bonusu</p></div>
        <div class="m-new">YENİ</div>
      </button>
      <button class="mode-btn mode-hill" onclick="startGame('hill')">
        <div class="mode-icon">⛰️</div>
        <div class="mode-info"><h3>Engelli Yol</h3><p>Hız artıkça engeller çoğalır — ne kadar dayanırsın?</p></div>
      </button>
    </div>
  </div>
</div>

<!-- OYUN -->
<div id="gameScreen">
  <div class="hud">
    <div class="hud-lives" id="hudLives">❤️❤️❤️</div>
    <div class="hud-target">
      <div>
        <div class="hud-target-label">YAKALA</div>
        <div class="hud-target-letter" id="hudLetter">ب</div>
      </div>
      <div class="hud-target-pic" id="hudPic">🏠</div>
    </div>
    <div class="hud-right">
      <div class="hud-score" id="hudScore">0</div>
      <div class="hud-streak" id="hudStreak"></div>
    </div>
  </div>
  <div class="fuel-bar-wrap" id="fuelWrap">
    <div class="fuel-bar-fill" id="fuelBar" style="width:100%"></div>
    <div class="fuel-bar-icon">⛽</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="touch-zones">
    <div class="touch-l" id="touchL">◀</div>
    <div class="touch-r" id="touchR">▶</div>
  </div>
</div>

<!-- GERİ SAYIM -->
<div id="cdOverlay"><div class="cd-num" id="cdNum">3</div></div>

<!-- BİTİŞ -->
<div id="endScreen">
  <div class="end-content">
    <div class="end-emoji" id="endEmoji">🏆</div>
    <div class="end-title" id="endTitle">Harika!</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-n" id="endScore">0</div><div class="stat-l">Puan</div></div>
      <div class="stat-card"><div class="stat-n" id="endCorrect">0</div><div class="stat-l">Doğru</div></div>
      <div class="stat-card"><div class="stat-n" id="endDist">0m</div><div class="stat-l">Mesafe</div></div>
    </div>
    <div class="e-btns">
      <button class="e-btn e-replay" onclick="startGame(lastMode)">🔄 Tekrar</button>
      <button class="e-btn e-menu"   onclick="showMenu()">🏠 Menü</button>
    </div>
  </div>
</div>

</div><!-- /app -->

/* ══════════════════════════════════════════
   SES
══════════════════════════════════════════ */
let _aud=null;
function snd(key){
  return new Promise(r=>{
    const src=AUDIO[key];if(!src){r();return}
    if(_aud){try{_aud.pause();_aud.currentTime=0}catch(e){}}
    const a=new Audio(src);_aud=a;
    a.onended=r;a.onerror=r;a.play().catch(r);
    setTimeout(r,3500);
  });
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* ══════════════════════════════════════════
   CANVAS OYUN
══════════════════════════════════════════ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W=0,H=0,DPR=1;

function resizeCanvas(){
  DPR = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width  = W*DPR;
  canvas.height = H*DPR;
  ctx.scale(DPR,DPR);
}

/* LANE SİSTEMİ */
const LANE_COUNT = 3;
let laneW=0, roadL=0, roadR=0;

function updateLanes(){
  laneW = W * 0.88 / LANE_COUNT;
  roadL = W * 0.06;
  roadR = W * 0.94;
}

/* OYUN DURUMU */
let gameActive=false, lastMode='road';
let playerLane=1, playerVisX=0;
let obstacles=[], pickups=[];
let fuel=100, score=0, lives=3, streak=0, maxStreak=0;
let correct=0, distance=0;
let baseSpeed=4, speed=4;
let roadOffset=0;
let targetIdx=0, targetL=null;
let spawnCooldown=0, pickupCooldown=0;
let soundPlaying=false;
let timeLeft=60; // zamana karşı modunda
let raf=null;

/* ARAÇ */
const CAR_W=48, CAR_H=72;
let playerY=0;
let carShake=0, carBoost=0;

/* ══ GERİ SAYIM ══ */
async function countdown(){
  const ov=document.getElementById('cdOverlay');
  const num=document.getElementById('cdNum');
  ov.style.display='flex';
  for(let i=3;i>=1;i--){
    num.textContent=i;
    num.style.animation='none';void num.offsetWidth;
    num.style.animation='cdAnim .42s ease-out forwards';
    await wait(420); // kısa — kullanıcı beklemez
  }
  num.textContent='GİT! 🏁';
  num.style.color='#FFD700';
  num.style.animation='none';void num.offsetWidth;
  num.style.animation='cdAnim .42s ease-out forwards';
  await wait(280); // hızlı geç
  ov.style.display='none';
  num.style.color='white';
}

/* ══ OYUNU BAŞLAT ══ */
async function startGame(mode){
  lastMode=mode;
  document.getElementById('menuScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  await wait(50);
  resizeCanvas();updateLanes();

  playerLane=1; playerVisX=roadL+laneW*1+laneW/2;
  playerY=H-CAR_H-20;
  obstacles=[];pickups=[];
  fuel=100;score=0;lives=3;streak=0;maxStreak=0;
  correct=0;distance=0;carShake=0;carBoost=0;
  timeLeft=60;
  baseSpeed = mode==='hill'?3:4;
  speed=baseSpeed;
  roadOffset=0;spawnCooldown=0;pickupCooldown=0;
  gameActive=true;

  // İlk hedef
  newTarget();
  updateHUD();
  setFuelBar(100);

  // Geri sayım — oyun döngüsü BAŞLAMAZ henüz
  await countdown();

  // Ses ve döngü aynı anda
  snd(targetL.ar); // GİT! ile aynı anda ses çalar
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);

  // Zamana karşı timer
  if(mode==='time') startTimer();
}

let timerInt=null;
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!gameActive)return;
    timeLeft=Math.max(0,timeLeft-1);
    setFuelBar((timeLeft/60)*100); // time mode: fuel = time
    if(timeLeft<=0) endGame();
  },1000);
}

/* ══ HEDEF ══ */
function newTarget(){
  const prev=targetIdx;
  do{ targetIdx=Math.floor(Math.random()*LETTERS.length); }
  while(targetIdx===prev && LETTERS.length>1);
  targetL=LETTERS[targetIdx];
  document.getElementById('hudLetter').textContent=targetL.ar;
  document.getElementById('hudLetter').style.color=targetL.c;
  document.getElementById('hudPic').textContent=targetL.pic;
}

/* ══ SPAWN ENGELLERİ ══ */
function spawnObstacles(){
  // Doğru harfi rastgele bir şeride koy, diğerlerine yanlış
  const correctLane=Math.floor(Math.random()*LANE_COUNT);
  const wrongPool=LETTERS.filter(l=>l.ar!==targetL.ar);
  shuffle(wrongPool);

  for(let lane=0;lane<LANE_COUNT;lane++){
    const isCorrect=lane===correctLane;
    const L=isCorrect?targetL:wrongPool[lane%wrongPool.length];
    obstacles.push({
      lane, x:roadL+lane*laneW+laneW/2, y:-80,
      ar:L.ar, pic:L.pic, color:L.c,
      isCorrect, collected:false,
      w:laneW*0.72, h:laneW*0.85,
      flash:0
    });
  }
}

/* ══ SPAWN HAREKELERİ (BONUS PICKUP) ══ */
function spawnPickup(){
  const h=HAREKELER[Math.floor(Math.random()*HAREKELER.length)];
  const lane=Math.floor(Math.random()*LANE_COUNT);
  pickups.push({
    lane, x:roadL+lane*laneW+laneW/2, y:-40,
    sym:h.sym, color:h.color, fuel:h.fuel, key:h.key,
    r:18, collected:false, spin:0
  });
}

/* ══ DÖNGÜ ══ */
let lastT=0;
function loop(t){
  if(!gameActive){return}
  const dt=Math.min((t-lastT)/16,3); lastT=t;
  update(dt);
  render();
  raf=requestAnimationFrame(loop);
}

function update(dt){
  distance+=speed*dt*0.1;
  roadOffset=(roadOffset+speed*dt*1.5)%(H/4);

  // Hız artışı (engelli yol modunda daha hızlı)
  if(lastMode==='hill') speed=Math.min(14,baseSpeed+distance*0.008);
  else speed=Math.min(10,baseSpeed+distance*0.003);

  // Player smooth hareket
  const targetX=roadL+playerLane*laneW+laneW/2;
  playerVisX+=(targetX-playerVisX)*0.18*dt;

  // Engeller hareket
  obstacles.forEach(o=>{
    o.y+=speed*dt*1.6;
    if(o.flash>0) o.flash-=dt*0.1;
  });

  // Pickup hareket
  pickups.forEach(p=>{
    p.y+=speed*dt*1.2;
    p.spin+=dt*3;
  });

  // Çarpışma
  checkCollisions();

  // Temizle
  obstacles=obstacles.filter(o=>o.y<H+100&&!o.collected);
  pickups=pickups.filter(p=>p.y<H+60&&!p.collected);

  // Spawn
  spawnCooldown-=dt;
  if(spawnCooldown<=0){
    spawnObstacles();
    // Mesafeye göre cooldown azalır
    spawnCooldown=Math.max(25,55-distance*0.1);
  }
  pickupCooldown-=dt;
  if(pickupCooldown<=0){
    spawnPickup();
    pickupCooldown=Math.max(60,120-distance*0.05);
  }

  // Fuel (road ve hill modlarında)
  if(lastMode!=='time'){
    fuel=Math.max(0,fuel-0.015*dt);
    setFuelBar(fuel);
    if(fuel<=0) endGame();
  }

  // Efektler
  if(carShake>0) carShake-=dt*0.2;
  if(carBoost>0) carBoost-=dt*0.05;
}

/* ══ ÇARPIŞMA ══ */
function checkCollisions(){
  const px=playerVisX, py=playerY+CAR_H*0.5;
  const PR=CAR_W*0.38;

  obstacles.forEach(o=>{
    if(o.collected) return;
    const dx=Math.abs(o.x-px), dy=Math.abs(o.y+o.h/2-py);
    if(dx<(o.w/2+PR)*0.7 && dy<(o.h/2+CAR_H/2)*0.5){
      o.collected=true;
      if(o.isCorrect) onCorrect(o);
      else             onWrong(o);
    }
  });

  pickups.forEach(p=>{
    if(p.collected) return;
    const dx=Math.abs(p.x-px), dy=Math.abs(p.y-py);
    if(dx<p.r+PR && dy<p.r+20){
      p.collected=true;
      onPickup(p);
    }
  });
}

/* ══ CEVAP EFEKTLERİ ══ */
function onCorrect(o){
  streak++; correct++; maxStreak=Math.max(maxStreak,streak);
  const bonus=streak>3?streak*3:streak>1?streak*2:0;
  score+=10+bonus;
  carBoost=1;
  updateHUD();
  burst(playerVisX,playerY,['#A29BFE','#FFD700','#55EFC4']);
  snd('correct');
  // Yeni heref seç + sesi çal
  setTimeout(()=>{newTarget();snd(targetL.ar);},500);
}

function onWrong(o){
  streak=0; lives=Math.max(0,lives-1);
  carShake=1;
  o.flash=1;
  updateHUD();
  snd('wrong');
  if(lives<=0){setTimeout(endGame,400);}
}

function onPickup(p){
  if(lastMode!=='time'){
    fuel=Math.min(100,fuel+p.fuel);
    setFuelBar(fuel);
  } else {
    timeLeft=Math.min(60,timeLeft+5);
  }
  score+=5;
  updateHUD();
  snd(p.key);
  burst(p.x,p.y,[p.color,'#FFD700','white']);
}

/* ══ RENDER ══ */
function render(){
  ctx.clearRect(0,0,W,H);
  drawRoad();
  drawPickups();
  drawObstacles();
  drawCar();
}

function drawRoad(){
  // Asfalt
  ctx.fillStyle='#2d3436';
  roundRect(ctx,roadL,0,roadR-roadL,H,0);ctx.fill();

  // Yol kenarı çizgileri
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(roadL,0);ctx.lineTo(roadL,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(roadR,0);ctx.lineTo(roadR,H);ctx.stroke();

  // Şerit çizgileri (kesik)
  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;
  ctx.setLineDash([H/8,H/8]);ctx.lineDashOffset=-roadOffset;
  for(let i=1;i<LANE_COUNT;i++){
    const lx=roadL+i*laneW;
    ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();
  }
  ctx.setLineDash([]);

  // Kenarlık çimenler
  ctx.fillStyle='#27ae60';
  roundRect(ctx,0,0,roadL,H,0);ctx.fill();
  roundRect(ctx,roadR,0,W-roadR,H,0);ctx.fill();

  // Çimen doku çizgileri
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1;
  for(let y=-H/6+roadOffset/2;y<H;y+=H/6){
    ctx.beginPath();
    ctx.moveTo(0,y);ctx.lineTo(roadL,y+30);ctx.stroke();
    ctx.moveTo(roadR,y);ctx.lineTo(W,y+30);ctx.stroke();
  }
}

function drawObstacles(){
  obstacles.forEach(o=>{
    const x=o.x,y=o.y,w=o.w,h=o.h;
    const r=12;

    // Gölge
    ctx.fillStyle='rgba(0,0,0,.25)';
    roundRect(ctx,x-w/2+4,y+4,w,h,r);ctx.fill();

    // Arkaplan
    const correct=o.isCorrect;
    const baseAlpha=o.flash>0?Math.sin(o.flash*Math.PI)*0.4:0;
    ctx.fillStyle=correct?o.color:`rgba(80,80,80,.85)`;
    if(o.flash>0) ctx.fillStyle=correct?`rgba(255,200,0,.9)`:`rgba(220,50,50,.9)`;
    roundRect(ctx,x-w/2,y,w,h,r);ctx.fill();

    // Border
    ctx.strokeStyle=correct?'rgba(255,255,255,.6)':'rgba(255,255,255,.15)';
    ctx.lineWidth=correct?2.5:1;
    roundRect(ctx,x-w/2,y,w,h,r);ctx.stroke();

    // Doğruysa parıltı efekti
    if(correct){
      const grd=ctx.createRadialGradient(x,y+h/2,0,x,y+h/2,w*0.7);
      grd.addColorStop(0,'rgba(255,255,255,.18)');
      grd.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=grd;
      roundRect(ctx,x-w/2,y,w,h,r);ctx.fill();
    }

    // Arapça harf
    ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.font=`bold ${Math.round(w*0.62)}px 'Amiri', serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=4;
    ctx.fillText(o.ar,x,y+h*0.46);
    ctx.shadowBlur=0;

    // Emoji
    ctx.font=`${Math.round(w*0.25)}px sans-serif`;
    ctx.fillText(o.pic,x,y+h*0.82);
  });
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

function drawPickups(){
  pickups.forEach(p=>{
    const x=p.x,y=p.y,r=p.r;

    // Parıltı halkası
    ctx.beginPath();
    ctx.arc(x,y,r+4+Math.sin(p.spin)*3,0,Math.PI*2);
    ctx.fillStyle=`${p.color}44`;ctx.fill();

    // Ana daire
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;ctx.stroke();

    // Hareke sembolü
    ctx.fillStyle='rgba(0,0,0,.8)';
    ctx.font=`bold ${r}px 'Amiri', serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.sym,x,y+2);

    // Yakıt ikonu
    ctx.font=`${Math.round(r*0.8)}px sans-serif`;
    ctx.fillText('⛽',x+r,y-r);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
  });
}

function drawCar(){
  const x=playerVisX,y=playerY;
  const shakeX=carShake>0?(Math.random()-.5)*8*carShake:0;
  const cx=x+shakeX;

  // Boost alev izi
  if(carBoost>0){
    for(let i=0;i<5;i++){
      const alpha=carBoost*(1-i/5)*0.6;
      const sz=(20-i*3)*carBoost;
      ctx.beginPath();ctx.arc(cx+(Math.random()-.5)*12,y+CAR_H+i*10,sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,${150+i*20},0,${alpha})`;ctx.fill();
    }
  }

  // Araba gövdesi
  ctx.fillStyle=carBoost>0?'#A29BFE':'#6C5CE7';
  roundRect(ctx,cx-CAR_W/2,y+8,CAR_W,CAR_H-16,10);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;
  roundRect(ctx,cx-CAR_W/2,y+8,CAR_W,CAR_H-16,10);ctx.stroke();

  // Cam
  ctx.fillStyle='rgba(100,200,255,.5)';
  roundRect(ctx,cx-CAR_W/2+6,y+14,CAR_W-12,CAR_H*0.38,6);ctx.fill();

  // Tekerlekler
  [[cx-CAR_W/2+4,y+14],[cx+CAR_W/2-4,y+14],
   [cx-CAR_W/2+4,y+CAR_H-14],[cx+CAR_W/2-4,y+CAR_H-14]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.arc(wx,wy,8,0,Math.PI*2);
    ctx.fillStyle='#2d3436';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // Farllar
  ctx.fillStyle='rgba(255,255,180,.9)';
  roundRect(ctx,cx-CAR_W/2+3,y+8,10,6,3);ctx.fill();
  roundRect(ctx,cx+CAR_W/2-13,y+8,10,6,3);ctx.fill();
}

/* ══ YARDIMCI CANVAS ══ */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ══ HUD ══ */
function updateHUD(){
  document.getElementById('hudLives').textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudStreak').textContent=streak>1?'🔥'+streak+'x':'';
}
function setFuelBar(v){
  const pct=Math.max(0,Math.min(100,v));
  document.getElementById('fuelBar').style.width=pct+'%';
  document.getElementById('fuelBar').style.background=
    pct>50?'linear-gradient(90deg,#00B894,#55EFC4)':
    pct>25?'linear-gradient(90deg,#FDCB6E,#e17055)':
           'linear-gradient(90deg,#d63031,#e17055)';
}

/* ══ KONTROLLER ══ */
const touchL=document.getElementById('touchL');
const touchR=document.getElementById('touchR');

function handleTouchStart(e){
  if(!gameActive)return;
  const t=e.touches[0]||e;
  const cx=canvas.getBoundingClientRect().left+W/2;
  if(t.clientX<cx){
    playerLane=Math.max(0,playerLane-1);
    touchL.classList.add('active');setTimeout(()=>touchL.classList.remove('active'),150);
  } else {
    playerLane=Math.min(LANE_COUNT-1,playerLane+1);
    touchR.classList.add('active');setTimeout(()=>touchR.classList.remove('active'),150);
  }
}

canvas.addEventListener('touchstart',handleTouchStart,{passive:true});
canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const ex=e.clientX-rect.left;
  const fake={touches:[{clientX:e.clientX}]};
  if(ex<W/2){playerLane=Math.max(0,playerLane-1);}
  else {playerLane=Math.min(LANE_COUNT-1,playerLane+1);}
});

/* ══ BİTİŞ ══ */
function endGame(){
  gameActive=false;
  clearInterval(timerInt);
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const won=lives>0&&(lastMode!=='time'||timeLeft>0);
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='flex';
  document.getElementById('endEmoji').textContent=won?'🏆':'🚗';
  document.getElementById('endTitle').textContent=won?'Harika sürüş! 🎉':'Tekrar dene! 💪';
  document.getElementById('endScore').textContent=score;
  document.getElementById('endCorrect').textContent=correct;
  document.getElementById('endDist').textContent=Math.round(distance)+'m';
  snd(won?'aferin':'tekrar');
  if(won) spawnCelebration();
}

function showMenu(){
  gameActive=false;clearInterval(timerInt);
  if(raf){cancelAnimationFrame(raf);raf=null;}
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('menuScreen').style.display='flex';
}

/* ══ PARTİKÜLLER ══ */
function burst(cx,cy,cols){
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='fp';
    const sz=7+Math.random()*10,a=(i/12)*Math.PI*2,d=50+Math.random()*80;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};
      position:fixed;border-radius:50%;left:${cx-sz/2}px;top:${cy-sz/2}px;
      --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;pointer-events:none;z-index:999;
      animation:fp .7s ease-out forwards`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),750);
  }
}

function spawnCelebration(){
  for(let i=0;i<28;i++)setTimeout(()=>{
    const p=document.createElement('div');p.className='fp';
    const cols=['#6C5CE7','#A29BFE','#FFD700','#00B894','#FF7675'];
    const sz=10+Math.random()*14,a=Math.random()*Math.PI*2,d=120+Math.random()*200;
    const sx=Math.random()*window.innerWidth,sy=80+Math.random()*window.innerHeight*.6;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};
      position:fixed;border-radius:50%;left:${sx}px;top:${sy}px;
      --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;pointer-events:none;z-index:999;
      animation:fp .7s ease-out forwards`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),750);
  },i*60);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ══ YILDIZLI ARKA PLAN (MENÜ) ══ */
(()=>{
  const bg=document.getElementById('starsBg');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star-dot';
    const sz=1+Math.random()*2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;
      top:${Math.random()*100}%;animation-delay:${Math.random()*2}s;

window.addEventListener('resize',()=>{if(gameActive){resizeCanvas();updateLanes();}});
